name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_OPTIONS: --no-warnings

jobs:
  # ==================== macOS Build (Universal) ====================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_NO_WARNINGS: 1
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: '贴立方 ${{ github.ref_name || inputs.version }}'
          releaseBody: |
            ## 贴立方 ${{ github.ref_name || inputs.version }}
            
            ### 新功能
            - Tab 分类功能（全部/文本/图片）
            - 图片点击使用系统默认应用打开
            - 列表按时间倒序排列
            - 自动启动 mDNS 设备发现服务
            - 托盘菜单优化
            
            ### 修复
            - 修复托盘退出功能无效的问题
            - 修复设备管理、文件传输菜单无法打开窗口的问题
            
            ---
            **支持平台**: macOS (Intel/Apple Silicon), Windows, Linux
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  # ==================== Windows Build ====================
  build-windows:
    runs-on: windows-latest
    needs: build-macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_NO_WARNINGS: 1
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: '贴立方 ${{ github.ref_name || inputs.version }}'
          releaseDraft: true
          prerelease: false

  # ==================== Linux Build ====================
  build-linux:
    runs-on: ubuntu-22.04
    needs: build-windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_NO_WARNINGS: 1
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: '贴立方 ${{ github.ref_name || inputs.version }}'
          releaseDraft: true
          prerelease: false

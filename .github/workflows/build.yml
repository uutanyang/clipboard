name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
            rust-targets: x86_64-apple-darwin,aarch64-apple-darwin
          - platform: windows-latest
            args: --bundles nsis
            rust-targets: ''
          - platform: ubuntu-22.04
            args: --bundles deb,appimage
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2

      - name: Install create-dmg (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '贴立方 ${{ github.ref_name }}'
          releaseBody: 'See release notes'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.AppImage
          if-no-files-found: warn
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '贴立方 ${{ github.ref_name }}'
          body: |
            ## 贴立方 ${{ github.ref_name }}

            ### 功能
            - Tab 分类（全部/文本/图片）
            - 图片点击用系统默认应用打开
            - 列表按时间倒序排列
            - 自动启动 mDNS 设备发现服务

            ### 支持
            macOS (Intel/Apple Silicon), Windows, Linux
          draft: true
          prerelease: false
          files: artifacts/**
